<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Database Systems Project: Smart Bus Ticketing and Reservation System. High-fidelity glassmorphic user signup and registration portal.">
  <title>Travello - Database Signup Portal</title>
  <link rel="stylesheet" href="styles.css?v=46">
</head>
<body class="signup-page">
  <div class="auth-split-container">
    
    <!-- Left Pane: Bus Image & Brand Message -->
    <div class="auth-left-pane">
      <div class="auth-image-content">
        <h1 class="auth-image-title">Think Tickets,<br>Think Travello</h1>
      </div>
    </div>

    <!-- Right Pane: Signup Form -->
    <div class="auth-right-pane">
      <div class="auth-form-content">
        
        <!-- Logo Row -->
        <div class="auth-logo-row">
          <div class="auth-logo"><span class="auth-logo-text">tr<span class="logo-green">a</span>vello</span><svg viewBox="0 0 24 24" width="28" height="28" stroke="#006a4e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.2 10.6 16 10 16 10c0-1.7-1.3-3-3-3H8c-1.7 0-3 1.3-3 3 0 0-2.2.6-3.5 1.1C.7 10.3 0 11.1 0 12v3c0 .6.4 1 1 1h2"></path>
              <path d="M5 17h12"></path>
              <circle cx="7" cy="17" r="2.5"></circle>
              <circle cx="7" cy="17" r="1" style="fill: #006a4e !important; stroke: none !important;"></circle>
              <circle cx="17" cy="17" r="2.5"></circle>
              <circle cx="17" cy="17" r="1" style="fill: #006a4e !important; stroke: none !important;"></circle>
            </svg>
          </div>
        </div>

        <h2 class="auth-welcome-title">Create Account</h2>
        <p class="auth-welcome-sub">Sign up for a <span class="brand-bold">Travello</span> account and enjoy a seamless journey across all services</p>

        <!-- Signup Form -->
        <form id="signupForm" class="auth-light-form" novalidate>
          
          <!-- Field 1: Your name -->
          <div class="form-group">
            <label class="form-label" for="nameInput">Your name <span class="req">*</span></label>
            <input type="text" id="nameInput" name="name" class="form-input" placeholder="Enter your full name" autocomplete="name" required>
          </div>

          <!-- Field 2: Username -->
          <div class="form-group">
            <label class="form-label" for="usernameInput">Username <span class="req">*</span></label>
            <input type="text" id="usernameInput" name="username" class="form-input" placeholder="Enter username" autocomplete="username" required>
          </div>

          <!-- Field 3: Password with Eye Toggle -->
          <div class="form-group password-group">
            <label class="form-label" for="passwordInput">Password <span class="req">*</span></label>
            <div style="position: relative; width: 100%;">
              <input type="password" id="passwordInput" name="password" class="form-input" placeholder="Enter password (min 8 chars, mixed cases, digit, symbol)" autocomplete="new-password" required>
              <button type="button" id="passwordToggleBtn" class="password-toggle-btn" aria-label="Toggle password visibility">
                <svg id="eyeIcon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>

          <!-- Field 4: Your email -->
          <div class="form-group">
            <label class="form-label" for="emailInput">Your email <span class="req">*</span></label>
            <input type="email" id="emailInput" name="email" class="form-input" placeholder="Enter your email address" autocomplete="email" required>
          </div>

          <!-- Field 5: Phone Number -->
          <div class="form-group">
            <label class="form-label" for="phoneInput">Phone Number <span class="req">*</span></label>
            <input type="tel" id="phoneInput" name="phone" class="form-input" placeholder="Enter contact number" autocomplete="tel" required>
          </div>

          <!-- Field 6: Present Address -->
          <div class="form-address-group">
            <div class="address-group-label">Present Address</div>
            <div class="address-grid">
              <div class="form-group">
                <input type="text" id="presAreaInput" name="presArea" class="form-input" placeholder="Area/Road" required>
              </div>
              <div class="form-group">
                <input type="text" id="presUpazillaInput" name="presUpazilla" class="form-input" placeholder="Upazilla" required>
              </div>
              <div class="form-group">
                <input type="text" id="presDistrictInput" name="presDistrict" class="form-input" placeholder="District" required>
              </div>
              <div class="form-group">
                <input type="text" id="presDivisionInput" name="presDivision" class="form-input" placeholder="Division" required>
              </div>
            </div>
          </div>

          <!-- Field 7: Permanent Address -->
          <div class="form-address-group">
            <div class="address-group-label">Permanent Address</div>
            <div class="address-grid">
              <div class="form-group">
                <input type="text" id="permAreaInput" name="permArea" class="form-input" placeholder="Area/Road" required>
              </div>
              <div class="form-group">
                <input type="text" id="permUpazillaInput" name="permUpazilla" class="form-input" placeholder="Upazilla" required>
              </div>
              <div class="form-group">
                <input type="text" id="permDistrictInput" name="permDistrict" class="form-input" placeholder="District" required>
              </div>
              <div class="form-group">
                <input type="text" id="permDivisionInput" name="permDivision" class="form-input" placeholder="Division" required>
              </div>
            </div>
          </div>

          <!-- Field 8: Gender -->
          <div class="form-radio-group">
            <div class="radio-group-label">Gender</div>
            <div class="radio-options">
              <label class="radio-label">
                <input type="radio" name="gender" value="Male" class="radio-input" required>
                <span class="radio-custom"></span>
                Male
              </label>
              <label class="radio-label">
                <input type="radio" name="gender" value="Female" class="radio-input">
                <span class="radio-custom"></span>
                Female
              </label>
              <label class="radio-label">
                <input type="radio" name="gender" value="Others" class="radio-input">
                <span class="radio-custom"></span>
                Others
              </label>
            </div>
          </div>

          <!-- Field 8.5: User Type -->
          <div class="form-radio-group">
            <div class="radio-group-label">User Type</div>
            <div class="radio-options">
              <label class="radio-label">
                <input type="radio" name="userType" value="User" class="radio-input" checked required>
                <span class="radio-custom"></span>
                User
              </label>
              <label class="radio-label">
                <input type="radio" name="userType" value="Admin" class="radio-input">
                <span class="radio-custom"></span>
                Admin
              </label>
            </div>
          </div>

          <!-- Field 9: Profession -->
          <div class="form-group">
            <label class="form-label" for="professionInput">Profession <span class="req">*</span></label>
            <input type="text" id="professionInput" name="profession" class="form-input" placeholder="Enter your profession" required>
          </div>

          <!-- Action Buttons -->
          <button type="submit" class="auth-submit-btn">
            Sign Up
          </button>
          
          <div style="margin-top: 0.5rem;">
            <a href="index.html" class="auth-forgot-link auth-back-btn" style="text-decoration: none;">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
              Back to Home
            </a>
          </div>

        </form>

        <p class="auth-footer-redirect">
          Already registered? <button type="button" id="signInRedirectBtn" class="link-btn auth-redirect-link" style="text-decoration: underline; background: none; border: none; font-weight: 700; cursor: pointer; padding: 0; font-size: 0.95rem;">Sign In</button>
        </p>

        <div class="auth-copyright">
          © Travello 2026
        </div>

      </div>
    </div>

  </div>

  <!-- Toast Notification Wrapper -->
  <div id="toast" class="toast" role="alert" aria-live="assertive">
    <div class="toast-icon"></div>
    <div id="toastMessage" class="toast-message">Portal Alert</div>
  </div>

  <script src="signup.js?v=30"></script>
</body>
</html>
