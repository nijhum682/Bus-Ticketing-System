<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Database Systems Project: Smart Bus Ticketing and Reservation System. High-fidelity glassmorphic user signup and registration portal.">
  <title>Travello - Database Signup Portal</title>
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>



  <div class="signup-wrapper">
    
    <!-- Main Signup Form Card -->
    <main class="signup-main">
      <section class="card signup-card">
        
        <!-- Header / Logo -->
        <div class="logo-container">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24">
              <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-1.1 0-2 .9-2 2v7c0 .6.4 1 1 1h1"></path>
              <circle cx="7.5" cy="17.5" r="2.5"></circle>
              <circle cx="16.5" cy="17.5" r="2.5"></circle>
            </svg>
          </div>
          <div class="logo-text">
            Travello
            <span>Bus Database v1.0</span>
          </div>
        </div>
        <h1 class="signup-title">
          <svg class="header-icon" viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="17" y1="11" x2="23" y2="11"></line>
          </svg>
          Sign Up
        </h1>
        
        <!-- Signup Form -->
        <form id="signupForm" class="signup-form" novalidate>
          
          <!-- Field 1: Your name -->
          <div class="form-group">
            <input type="text" id="nameInput" name="name" class="form-input" placeholder="Your name" autocomplete="name" required>
          </div>

          <!-- Field 2: Username -->
          <div class="form-group">
            <input type="text" id="usernameInput" name="username" class="form-input" placeholder="Username" autocomplete="username" required>
          </div>

          <!-- Field 3: Password with Eye Toggle -->
          <div class="form-group password-group">
            <input type="password" id="passwordInput" name="password" class="form-input" placeholder="Password" autocomplete="new-password" required>
            <button type="button" id="passwordToggleBtn" class="password-toggle-btn" aria-label="Toggle password visibility">
              <svg id="eyeIcon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>

          <!-- Field 4: Your email -->
          <div class="form-group">
            <input type="email" id="emailInput" name="email" class="form-input" placeholder="Your email" autocomplete="email" required>
          </div>

          <!-- Field 5: Phone Number -->
          <div class="form-group">
            <input type="tel" id="phoneInput" name="phone" class="form-input" placeholder="Phone Number" autocomplete="tel" required>
          </div>

          <!-- Field 6: Present Address -->
          <div class="form-address-group">
            <div class="address-group-label">Present Address</div>
            <div class="address-grid">
              <div class="form-group">
                <input type="text" id="presAreaInput" name="presArea" class="form-input" placeholder="Area/Road" required>
              </div>
              <div class="form-group">
                <input type="text" id="presUpazillaInput" name="presUpazilla" class="form-input" placeholder="Upazilla" required>
              </div>
              <div class="form-group">
                <input type="text" id="presDistrictInput" name="presDistrict" class="form-input" placeholder="District" required>
              </div>
              <div class="form-group">
                <input type="text" id="presDivisionInput" name="presDivision" class="form-input" placeholder="Division" required>
              </div>
            </div>
          </div>

          <!-- Field 7: Permanent Address -->
          <div class="form-address-group">
            <div class="address-group-label">Permanent Address</div>
            <div class="address-grid">
              <div class="form-group">
                <input type="text" id="permAreaInput" name="permArea" class="form-input" placeholder="Area/Road" required>
              </div>
              <div class="form-group">
                <input type="text" id="permUpazillaInput" name="permUpazilla" class="form-input" placeholder="Upazilla" required>
              </div>
              <div class="form-group">
                <input type="text" id="permDistrictInput" name="permDistrict" class="form-input" placeholder="District" required>
              </div>
              <div class="form-group">
                <input type="text" id="permDivisionInput" name="permDivision" class="form-input" placeholder="Division" required>
              </div>
            </div>
          </div>

          <!-- Field 8: Gender -->
          <div class="form-gender-group">
            <div class="gender-group-label">Gender</div>
            <div class="gender-radio-options">
              <label class="gender-radio-label">
                <input type="radio" name="gender" value="Male" class="gender-radio-input" required>
                <span class="gender-radio-custom"></span>
                Male
              </label>
              <label class="gender-radio-label">
                <input type="radio" name="gender" value="Female" class="gender-radio-input">
                <span class="gender-radio-custom"></span>
                Female
              </label>
              <label class="gender-radio-label">
                <input type="radio" name="gender" value="Others" class="gender-radio-input">
                <span class="gender-radio-custom"></span>
                Others
              </label>
            </div>
          </div>

          <!-- Field 8.5: User Type -->
          <div class="form-gender-group">
            <div class="gender-group-label">User Type</div>
            <div class="gender-radio-options">
              <label class="gender-radio-label">
                <input type="radio" name="userType" value="User" class="gender-radio-input" checked required>
                <span class="gender-radio-custom"></span>
                User
              </label>
              <label class="gender-radio-label">
                <input type="radio" name="userType" value="Admin" class="gender-radio-input">
                <span class="gender-radio-custom"></span>
                Admin
              </label>
            </div>
          </div>

          <!-- Field 9: Profession -->
          <div class="form-group">
            <input type="text" id="professionInput" name="profession" class="form-input" placeholder="Profession" required>
          </div>

          <!-- Action Buttons -->
          <div class="signup-actions">
            <button type="submit" class="action-btn btn-primary">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
              Submit
            </button>
            <a href="index.html" class="action-btn btn-secondary text-center">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
              Back to Home
            </a>
          </div>

        </form>

        <p class="auth-redirect">
          Already registered? <button id="signInRedirectBtn" class="link-btn">Sign In</button>
        </p>

      </section>
    </main>

  </div>

  <!-- Toast Notification Wrapper -->
  <div id="toast" class="toast" role="alert" aria-live="assertive">
    <div class="toast-icon"></div>
    <div id="toastMessage" class="toast-message">Portal Alert</div>
  </div>

  <script src="signup.js?v=2"></script>
</body>
</html>
