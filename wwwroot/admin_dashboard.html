<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Database Systems Project: Travello Bus Ticketing and Reservation System. Admin Control Dashboard.">
  <title>Travello - Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=31">
  <style>
    /* Custom Admin Dashboard Elements */
    .admin-section-title {
      font-size: 1.15rem;
      font-family: var(--font-header);
      color: var(--accent-secondary);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .admin-section-title svg {
      stroke: var(--accent-secondary);
    }

    /* Table Styles */
    .table-container {
      width: 100%;
      overflow-x: auto;
      background: rgba(13, 18, 36, 0.7);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-sm);
      margin-bottom: 1.5rem;
      max-height: 580px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      text-align: left;
    }

    .admin-table th, .admin-table td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .admin-table th {
      background: rgba(20, 27, 47, 0.9);
      color: var(--text-primary);
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .admin-table tbody tr {
      transition: background var(--transition-fast);
    }

    .admin-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    /* Badges */
    .role-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .role-badge.admin {
      background: rgba(6, 182, 212, 0.15);
      color: var(--accent-secondary);
      border: 1px solid rgba(6, 182, 212, 0.3);
    }

    .role-badge.user {
      background: rgba(156, 163, 175, 0.15);
      color: var(--text-secondary);
      border: 1px solid rgba(156, 163, 175, 0.3);
    }

    /* Form Layout Grid */
    .notice-form-grid {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 480px) {
      .notice-form-grid {
        grid-template-columns: 1fr;
      }
    }

    .notice-textarea {
      height: auto !important;
      min-height: 100px;
      resize: vertical;
      font-family: var(--font-body);
      line-height: 1.5;
      padding: 0.75rem 1.25rem !important;
    }

    /* Action Buttons in List */
    .notice-actions {
      display: flex;
      gap: 0.5rem;
    }

    .mini-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      transition: all var(--transition-fast);
    }

    .mini-btn:hover {
      border-color: var(--border-color-active);
      background: rgba(255, 255, 255, 0.05);
    }

    .mini-btn.edit:hover {
      color: var(--accent-secondary);
      border-color: var(--accent-secondary);
      background: rgba(6, 182, 212, 0.1);
    }

    .mini-btn.delete:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
    }

    /* Scrollable Notice Admin List */
    .admin-notice-list {
      max-height: 240px;
      overflow-y: auto;
      background: rgba(13, 18, 36, 0.7);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-sm);
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      scrollbar-width: thin;
    }

    .admin-notice-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 0.75rem;
      gap: 1rem;
    }

    .admin-notice-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .admin-notice-content {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .admin-notice-content strong {
      color: var(--text-primary);
    }
  </style>
</head>
<body class="dashboard-page">
  <div class="signup-wrapper" style="max-width: 780px;">
    
    <!-- Main Dashboard Card -->
    <main class="signup-main">
      <section class="card signup-card">
        
        <!-- Header / Logo -->
        <div class="logo-container" style="justify-content: center; margin-bottom: 2rem;">
          <div class="auth-logo" style="display: flex; align-items: center; font-family: var(--font-header); font-size: 3.5rem; font-weight: 800; color: #ffffff; letter-spacing: -0.5px; gap: 0.75rem; justify-content: center; width: 100%;">
            <span class="auth-logo-text" style="color: #ffffff;">tr<span class="logo-green" style="color: #10b981;">a</span>vello</span><svg viewBox="0 0 24 24" width="48" height="48" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="stroke: #10b981;">
               <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.2 10.6 16 10 16 10c0-1.7-1.3-3-3-3H8c-1.7 0-3 1.3-3 3 0 0-2.2.6-3.5 1.1C.7 10.3 0 11.1 0 12v3c0 .6.4 1 1 1h2"></path>
               <path d="M5 17h12"></path>
               <circle cx="7" cy="17" r="2.5"></circle>
               <circle cx="7" cy="17" r="1" style="fill: #10b981 !important; stroke: none !important;"></circle>
               <circle cx="17" cy="17" r="2.5"></circle>
               <circle cx="17" cy="17" r="1" style="fill: #10b981 !important; stroke: none !important;"></circle>
            </svg>
          </div>
        </div>

        <h1 class="signup-title">
          <svg class="header-icon" viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Admin Dashboard
        </h1>

        <!-- Section 1: User Audit Registry -->
        <div class="form-address-group" style="margin-bottom: 1.5rem;">
          <div class="admin-section-title">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            Registered Users Registry
          </div>

          <div class="table-container">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Username</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Role</th>
                </tr>
              </thead>
              <tbody id="userTableBody">
                <tr>
                  <td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 1.5rem;">Loading registered users...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Section 2: Notice Board CRUD -->
        <div class="form-address-group" style="margin-bottom: 2rem;">
          <div class="admin-section-title">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            Notice Board Management
          </div>

          <!-- Notice Create/Edit Form -->
          <form id="noticeForm" class="signup-form" style="background: rgba(13, 18, 36, 0.4); border: 1px dashed var(--border-color); border-radius: var(--border-radius-sm); padding: 1.25rem; margin-bottom: 1.25rem;">
            <input type="hidden" id="noticeIdInput" value="">
            
            <div class="notice-form-grid">
              <div class="form-group" style="margin-bottom: 0;">
                <input type="text" id="noticeNumberInput" class="form-input" placeholder="No." required maxlength="3">
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <input type="text" id="noticeTitleInput" class="form-input" placeholder="Notice Title (e.g. Refund Policy)" required>
              </div>
            </div>

            <div class="form-group" style="margin-bottom: 1rem;">
              <textarea id="noticeContentInput" class="form-input notice-textarea" placeholder="Describe the notice details or policy statement..." required></textarea>
            </div>

            <div style="display: flex; gap: 0.75rem;">
              <button type="submit" id="noticeSubmitBtn" class="action-btn btn-primary" style="padding: 0 1.5rem; height: 38px; font-size: 0.85rem;">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.25rem;">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span id="submitBtnText">Add Notice</span>
              </button>
              <button type="button" id="cancelEditBtn" class="action-btn btn-secondary" style="padding: 0 1.25rem; height: 38px; font-size: 0.85rem; display: none;">
                Cancel
              </button>
            </div>
          </form>

          <!-- Notices Scrollable List -->
          <div id="adminNoticesContainer" class="admin-notice-list">
            <div style="text-align: center; color: var(--text-secondary); padding: 1.5rem 0;">Loading notices...</div>
          </div>
        </div>

        <!-- Dashboard Actions -->
        <div class="signup-actions">
          <button id="logoutBtn" class="action-btn btn-primary" style="justify-content: center;">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Log Out
          </button>
        </div>

      </section>
    </main>
  </div>

  <!-- Toast Notification Wrapper -->
  <div id="toast" class="toast" role="alert" aria-live="assertive">
    <div class="toast-icon"></div>
    <div id="toastMessage" class="toast-message">Portal Alert</div>
  </div>

  <script src="admin_dashboard.js?v=31"></script>
</body>
</html>
