<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Database Systems Project: Travello Bus Ticketing. Search Results.">
  <title>Travello - Available Buses</title>
  <link rel="stylesheet" href="styles.css?v=40">
  <style>
    .results-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 1.5rem;
      position: relative;
      z-index: 10;
      max-width: 580px;
      margin: 0 auto;
      width: 100%;
    }
    
    .bus-listing-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-sm);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: all var(--transition-fast);
    }
    
    .bus-listing-card:hover {
      border-color: var(--border-color-active);
      background: rgba(255, 255, 255, 0.04);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
    
    .seat-btn {
      width: 38px;
      height: 38px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }
  </style>
</head>
<body class="dashboard-page">
  <!-- Background Canvas -->
  <div class="bg-canvas"></div>
  
  <div class="results-wrapper">
    <!-- Main Results Card -->
    <main class="signup-main">
      <section class="card signup-card">
        
        <!-- Header / Logo -->
        <div class="logo-container" style="justify-content: center; margin-bottom: 2rem;">
          <div class="auth-logo" style="display: flex; align-items: center; font-family: var(--font-header); font-size: 3.5rem; font-weight: 800; color: #ffffff; letter-spacing: -0.5px; gap: 0.75rem; justify-content: center; width: 100%;">
            <span class="auth-logo-text" style="color: #ffffff;">tr<span class="logo-green" style="color: #10b981;">a</span>vello</span><svg viewBox="0 0 24 24" width="48" height="48" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="stroke: #10b981;">
              <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.2 10.6 16 10 16 10c0-1.7-1.3-3-3-3H8c-1.7 0-3 1.3-3 3 0 0-2.2.6-3.5 1.1C.7 10.3 0 11.1 0 12v3c0 .6.4 1 1 1h2"></path>
              <path d="M5 17h12"></path>
              <circle cx="7" cy="17" r="2.5"></circle>
              <circle cx="7" cy="17" r="1" style="fill: #10b981 !important; stroke: none !important;"></circle>
              <circle cx="17" cy="17" r="2.5"></circle>
              <circle cx="17" cy="17" r="1" style="fill: #10b981 !important; stroke: none !important;"></circle>
            </svg>
          </div>
        </div>

        <!-- Title / Search Params -->
        <div class="address-group-label" style="margin-bottom: 1.5rem; font-size: 1.05rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem; color: var(--accent-secondary); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem;">
          <div style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-primary); font-family: var(--font-header); font-weight: 700; font-size: 1.1rem; text-transform: uppercase;">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="stroke: var(--accent-secondary);">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            <span>Available Buses (<span id="resultsCount">0</span>)</span>
          </div>
          <span id="searchParamsLabel" style="font-size: 0.82rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Bagerhat ➔ Chuadanga | 10/06/26</span>
        </div>

        <!-- Bus Listings Container -->
        <div id="busListingsContainer" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem;">
          <div style="text-align: center; color: var(--text-secondary); padding: 2rem 0;">Searching for available buses...</div>
        </div>

        <!-- Actions -->
        <div class="signup-actions" style="margin-top: 1rem;">
          <button id="backBtn" class="action-btn btn-secondary" style="justify-content: center; height: 48px;">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.35rem; transform: rotate(180deg);">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
            Back to Search
          </button>
        </div>

      </section>
    </main>
  </div>

  <!-- Seat Booking Modal -->
  <div id="bookingModal" class="modal-overlay" style="display: none; align-items: center; justify-content: center; z-index: 1500; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3, 5, 11, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);">
    <div class="card signup-card modal-card" style="max-width: 440px; width: 90%; margin: auto; position: relative; max-height: 92vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.6);">
      
      <!-- Modal Header -->
      <h2 style="font-family: var(--font-header); font-weight: 800; line-height: 1.25; letter-spacing: -0.5px; margin-bottom: 1.25rem; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 0.65rem; color: #ffffff; background: #070a13; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--border-radius-sm); padding: 0.6rem 1rem; width: 100%;">
        <svg viewBox="0 0 24 24" width="22" height="22" stroke="var(--accent-secondary)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="stroke: var(--accent-secondary);">
          <circle cx="7" cy="17" r="2"></circle>
          <circle cx="17" cy="17" r="2"></circle>
          <path d="M5 17h12"></path>
          <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.2 10.6 16 10 16 10c0-1.7-1.3-3-3-3H8c-1.7 0-3 1.3-3 3 0 0-2.2.6-3.5 1.1C.7 10.3 0 11.1 0 12v3c0 .6.4 1 1 1h2"></path>
        </svg>
        Select Seat & Book
      </h2>
      
      <div style="display: flex; flex-direction: column; gap: 1rem; width: 100%;">
        <!-- Bus Information -->
        <div style="font-size: 0.9rem; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); padding-bottom: 0.6rem; line-height: 1.5; text-align: left;">
          <span style="font-weight: 700; color: var(--text-primary); font-size: 1.1rem;" id="bookingBusOperator">Green Line</span> - <span id="bookingBusType" style="color: var(--text-muted); font-size: 0.85rem;">Non-AC</span><br>
          Route: <span id="bookingBusRoute" style="color: var(--accent-secondary); font-weight: 600;">Bagerhat ➔ Chuadanga</span><br>
          Departure: <span id="bookingBusTime" style="color: var(--warning); font-weight: 600;">08:15 PM</span>
        </div>

        <!-- Seat Grid Representation -->
        <div style="background: rgba(13, 18, 36, 0.8); border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); padding: 1.25rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; width: 100%;">
          <div style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; width: 100%; text-align: center; border-bottom: 1px dashed var(--border-color); padding-bottom: 0.4rem; margin-bottom: 0.25rem; letter-spacing: 1px;">Front / Driver</div>
          
          <div id="seatsGrid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; justify-items: center; width: 100%; max-height: 260px; overflow-y: auto; scrollbar-width: thin; padding: 2px;">
            <!-- 5-column layout: Col 1, Col 2, Corridor (empty), Col 4, Col 5 -->
          </div>
        </div>

        <!-- Selections Summary -->
        <div style="display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 500; border-top: 1px solid var(--border-color); padding-top: 0.75rem;">
          <span style="color: var(--text-secondary);">Selected Seat(s): <strong style="color: var(--success);" id="selectedSeatLabel">None</strong></span>
          <span style="color: var(--text-secondary);">Total Price: <strong style="color: var(--text-primary); font-size: 1.05rem;" id="totalPriceLabel">৳0</strong></span>
        </div>

        <!-- Action Buttons -->
        <div style="display: flex; gap: 0.75rem; width: 100%;">
          <button type="button" id="confirmBookingBtn" class="action-btn btn-primary" style="flex: 1; height: 44px; justify-content: center;" disabled>Confirm Booking</button>
          <button type="button" id="closeBookingModalBtn" class="action-btn btn-secondary" style="flex: 1; height: 44px; justify-content: center; background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid var(--border-color);">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification Wrapper -->
  <div id="toast" class="toast" role="alert" aria-live="assertive">
    <div class="toast-icon"></div>
    <div id="toastMessage" class="toast-message">Portal Alert</div>
  </div>

  <script src="search_results.js?v=41"></script>
</body>
</html>
